# Active when SPRING_PROFILES_ACTIVE=prod (Docker / production).
# Database: full JDBC URL + credentials from environment (not H2).

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      # First deployment: use "update" so Hibernate creates/aligns schema from entities.
      # After schema is stable, consider "validate" + Flyway/Liquibase for controlled migrations.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

app:
  demo-mode: false
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  risk:
    failed-login-threshold: 5
    phishing-alert-confidence-threshold: 60
  scheduler:
    enabled: ${APP_SCHEDULER_ENABLED:false}
    snapshot-interval-ms: 3600000
  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-api-url: https://generativelanguage.googleapis.com/v1beta
    groq-api-key: ${GROQ_API_KEY:}
    groq-model: ${GROQ_MODEL:llama-3.3-70b-versatile}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
