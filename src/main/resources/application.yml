spring:
  application:
    name: soc-backend

  datasource:
    # Local defaults; production MUST set DB_* via environment (see .env.example).
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:soc}?sslmode=${DB_SSL_MODE:prefer}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      # Creates/updates tables from entities on startup — no manual SQL in Supabase editor required.
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8085}

app:
  demo-mode: ${APP_DEMO_MODE:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  risk:
    failed-login-threshold: 5
    phishing-alert-confidence-threshold: 60
  scheduler:
    enabled: ${APP_SCHEDULER_ENABLED:false}
    snapshot-interval-ms: 3600000
  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-api-url: https://generativelanguage.googleapis.com/v1beta
    groq-api-key: ${GROQ_API_KEY:}
    groq-model: ${GROQ_MODEL:llama-3.3-70b-versatile}

jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-256-bits-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
