spring:
  datasource:
    url: jdbc:h2:mem:soc_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-must-be-long-enough-for-hs256-algorithm-testing-only

app:
  demo-mode: false
